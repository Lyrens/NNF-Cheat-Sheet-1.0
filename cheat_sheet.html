<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NNFRECA Cheat Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFD600;
    --orange: #FF6B00;
    --blue: #00C2FF;
    --pink: #FF3CAC;
    --green: #00E676;
    --purple: #B24BF3;
    --red: #FF3B3B;
    --dark: #0D0D1A;
    --card-bg: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    color: #fff;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(178,75,243,.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(0,194,255,.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255,107,0,.08) 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
  }

  .stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 3px; height: 3px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle var(--d, 4s) var(--delay, 0s) infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(1); }
    50% { opacity: .7; transform: scale(1.4); }
  }

  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 40px 20px 10px;
  }
  .logo-text {
    font-family: 'Lilita One', cursive;
    font-size: clamp(2.2rem, 6vw, 4rem);
    letter-spacing: 2px;
    background: linear-gradient(135deg, #a200ff 0%, #B24BF3 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,255,255,.4));
    text-transform: uppercase;
  }
  .logo-sub {
    font-size: .95rem;
    font-weight: 800;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,.35);
    margin-top: 4px;
  }

  .screen {
    display: none;
    position: relative; z-index: 5;
    padding: 20px 20px 50px;
    max-width: 1100px;
    margin: 0 auto;
    animation: fadeUp .35s ease;
  }
  .screen.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-family: 'Lilita One', cursive;
    font-size: clamp(1.3rem, 3.5vw, 2rem);
    text-align: center;
    margin-bottom: 28px;
    letter-spacing: 1px;
  }

  /* ── Mode grid ── */
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 14px;
  }

  .mode-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 16px 20px;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s, border-color .2s, background .2s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .mode-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--mc, #fff) 0%, transparent 70%);
    opacity: 0;
    transition: opacity .25s;
    z-index: 0;
  }
  .mode-card:hover::before { opacity: .07; }
  .mode-card:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 12px 40px -8px var(--mc, #fff4);
    border-color: var(--mc, #fff4);
  }
  .mode-card:active { transform: scale(.97); }

  .mode-icon {
    font-size: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    width: 60px;
    height: 60px;
    position: relative; z-index: 1;
  }
  .mode-icon img {
    width: 60px;
    height: 60px;
    object-fit: contain;
  }

  .mode-name {
    font-family: 'Lilita One', cursive;
    font-size: 1.5rem;
    color: var(--mc, #fff);
    position: relative; z-index: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,.4);
    flex: 1;
  }

  .mode-count {
    position: relative; z-index: 1;
    font-size: .72rem;
    font-weight: 900;
    letter-spacing: 1px;
    background: var(--mc, #fff2);
    color: #fff;
    padding: 3px 9px;
    border-radius: 20px;
    opacity: .7;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* ── Map grid ── */
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: .9rem;
    padding: 9px 20px;
    border-radius: 30px;
    cursor: pointer;
    margin-bottom: 22px;
    transition: background .2s, border-color .2s;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .back-btn:hover {
    background: rgba(255,255,255,.1);
    border-color: rgba(255,255,255,.3);
  }
  .back-btn span { font-size: 1.1rem; }

  .map-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }

  .map-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s, border-color .2s;
    position: relative;
  }
  .map-card:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 10px 30px -6px var(--mc, #fff3);
    border-color: var(--mc, #fff4);
  }
  .map-card:active { transform: scale(.96); }

  .map-thumb {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
  }

  .map-thumb-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    font-size: 2rem;
    color: rgba(255,255,255,.15);
    gap: 6px;
  }
  .map-thumb-placeholder .ph-label {
    font-size: .65rem;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,.1);
  }

  .map-name {
    padding: 10px 12px;
    font-size: .82rem;
    font-weight: 900;
    letter-spacing: .3px;
    text-align: center;
    border-top: 1px solid var(--border);
    color: rgba(255,255,255,.8);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    animation: fadeIn .2s ease;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .lightbox-inner {
      position: relative;
      width: auto;
      max-width: 90vw;
      max-height: 90vh;
    animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn {
    from { opacity:0; transform:scale(.85) }
    to   { opacity:1; transform:scale(1) }
  }

  .lightbox-img {
    width: 100%;
    border-radius: 18px;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
    display: block;
    border: 2px solid var(--lbmc, #fff3);
  }

  .lightbox-title {
    font-family: 'Lilita One', cursive;
    font-size: 1.3rem;
    text-align: center;
    margin-top: 14px;
    color: var(--lbmc, #fff);
    text-shadow: 0 2px 10px rgba(0,0,0,.5);
    letter-spacing: .5px;
  }
  .lightbox-mode {
    text-align: center;
    font-size: .78rem;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,.35);
    margin-top: 4px;
  }

  .lightbox-close {
    position: absolute;
    top: -14px; right: -14px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: #fff;
    color: #000;
    font-size: 1.1rem;
    font-weight: 900;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, background .15s;
    z-index: 10;
  }
  .lightbox-close:hover { transform: scale(1.15); background: var(--yellow); }

  .breadcrumb {
    display: flex; align-items: center; gap: 8px;
    font-size: .78rem;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,.3);
    margin-bottom: 24px;
  }
  .breadcrumb .sep { opacity: .3; }
  .breadcrumb .current { color: var(--mc, #fff); opacity: .8; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <div class="logo-text">NNFRECA</div>
  <div class="logo-sub">Cheat Sheet</div>
</header>

<div class="screen active" id="screen-modes">
  <div class="section-title" style="color:rgba(255,255,255,.6);">Choose a Game Mode</div>
  <div class="mode-grid" id="mode-grid"></div>
</div>

<div class="screen" id="screen-maps">
  <button class="back-btn" onclick="goBack()"><span>←</span> All Modes</button>
  <div class="breadcrumb">
    <span>Modes</span><span class="sep">›</span>
    <span class="current" id="bc-mode"></span>
  </div>
  <div class="section-title" id="maps-title"></div>
  <div class="map-grid" id="map-grid"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <div class="lightbox-title" id="lb-title"></div>
    <div class="lightbox-mode" id="lb-mode"></div>
  </div>
</div>

<script>
const MODES = [
  {
    id: 'gemgrab',
    name: 'Gem Grab',
    icon: 'icons/gemgrab.png',
    color: '#B24BF3',
    maps: [
      { name: 'Double Swoosh', img: 'maps/gemgrab/double-swoosh.png', draft: 'drafts/double-swoosh.png' },
      { name: 'Gem Fort', img: 'maps/gemgrab/gem-fort.png', draft: 'drafts/gem-fort.png' },
      { name: 'Hard Rock Mine', img: 'maps/gemgrab/hard-rock-mine.png', draft: 'drafts/hard-rock-mine.png' },
      { name: 'Undermine', img: 'maps/gemgrab/undermine.png', draft: 'drafts/undermine.png' },
    ]
  },
  {
    id: 'brawlball',
    name: 'Brawl Ball',
    icon: 'icons/brawlball.png',
    color: '#00C2FF',
    maps: [
      { name: 'Center Stage', img: 'maps/brawlball/center-stage.png', draft: 'drafts/center-stage.png' },
      { name: 'Pinball Dreams', img: 'maps/brawlball/pinball-dreams.png', draft: 'drafts/pinball-dreams.png' },
      { name: 'Sneaky Fields', img: 'maps/brawlball/sneaky-fields.png', draft: 'drafts/sneaky-fields.png' },
      { name: 'Spiralling Out', img: 'maps/brawlball/spiraling-out.png', draft: 'drafts/spiraling-out.png' },
      { name: 'Triple Dribble', img: 'maps/brawlball/triple-dribble.png', draft: 'drafts/triple-dribble.png' },
      { name: 'Beach Ball', img: 'maps/brawlball/beach-ball.png', draft: 'drafts/beach-ball.png' },
    ]
  },
  {
    id: 'heist',
    name: 'Heist',
    icon: 'icons/heist.png',
    color: '#FFD600',
    maps: [
      { name: 'Bridge Too Far', img: 'maps/heist/bridge-too-far.png', draft: 'drafts/bridge-too-far.png' },
      { name: 'Hot Potato', img: 'maps/heist/hot-potato.png', draft: 'drafts/hot-potato.png' },
      { name: 'Kaboom Canyon', img: 'maps/heist/kaboom-canyon.png', draft: 'drafts/kaboom-canyon.png' },
      { name: 'Safe Zone', img: 'maps/heist/safe-zone.png', draft: 'drafts/safe-zone.png' },
    ]
  },
  {
    id: 'bounty',
    name: 'Bounty',
    icon: 'icons/bounty.png',
    color: '#00E676',
    maps: [
      { name: 'Dry Season', img: 'maps/bounty/dry-season.png', draft: 'drafts/dry-season.png' },
      { name: 'Hideout', img: 'maps/bounty/hideout.png', draft: 'drafts/hideout.png' },
      { name: 'Layer Cake', img: 'maps/bounty/layer-cake.png', draft: 'drafts/layer-cake.png' },
      { name: 'Shooting Star', img: 'maps/bounty/shooting-star.png', draft: 'drafts/shooting-star.png' },
    ]
  },
  {
    id: 'knockout',
    name: 'Knockout',
    icon: 'icons/knockout.png',
    color: '#FF3B3B',
    maps: [
      { name: 'Belles Rock', img: 'maps/knockout/belles-rock.png', draft: 'drafts/belles-rock.png' },
      { name: 'Flaring Phoenix', img: 'maps/knockout/flaring-phoenix.png', draft: 'drafts/flaring-phoenix.png' },
      { name: 'New Horizons', img: 'maps/knockout/new-horizons.png', draft: 'drafts/new-horizons.png' },
      { name: 'Out in the open', img: 'maps/knockout/out-in-the-open.png', draft: 'drafts/out-in-the-open.png' },
    ]
  },
  {
    id: 'hotzone',
    name: 'Hot Zone',
    icon: 'icons/hotzone.png',
    color: '#FF6B00',
    maps: [
      { name: 'Dueling Beetles', img: 'maps/hotzone/dueling-beetles.png', draft: 'drafts/dueling-beetles.png' },
      { name: 'Open Business', img: 'maps/hotzone/open-business.png', draft: 'drafts/open-business.png' },
      { name: 'Parallel Plays', img: 'maps/hotzone/parallel-plays.png', draft: 'drafts/parallel-plays.png' },
      { name: 'Ring Of Fire', img: 'maps/hotzone/ring-of-fire.png', draft: 'drafts/ring-of-fire.png' },
    ]
  },
];

// Build mode grid
const modeGrid = document.getElementById('mode-grid');
MODES.forEach(mode => {
  const card = document.createElement('div');
  card.className = 'mode-card';
  card.style.setProperty('--mc', mode.color);
  card.innerHTML = `
    <div class="mode-icon">
    <img src="${mode.icon}" alt="${mode.name}">
    </div>
    <div class="mode-name">${mode.name}</div>
    <div class="mode-count">${mode.maps.length} maps</div>
  `;
  card.onclick = () => openMode(mode);
  modeGrid.appendChild(card);
});

let currentMode = null;

function openMode(mode) {
  currentMode = mode;
  document.getElementById('bc-mode').textContent = mode.name;
  document.getElementById('maps-title').innerHTML = `
  <span style="color:${mode.color}; display:flex; align-items:center; justify-content:center; gap:10px;">
    <img src="${mode.icon}" style="width:28px; height:28px;">
    ${mode.name}
  </span>
`;

  const mapGrid = document.getElementById('map-grid');
  mapGrid.innerHTML = '';
  mapGrid.style.setProperty('--mc', mode.color);

  mode.maps.forEach(map => {
    const card = document.createElement('div');
    card.className = 'map-card';
    card.style.setProperty('--mc', mode.color);

    card.innerHTML = `
      <div class="map-thumb-placeholder">
        🗺️<span class="ph-label">no image yet</span>
      </div>
      <div class="map-name">${map.name}</div>
    `;

    const img = new Image();
    img.onload = () => {
      const ph = card.querySelector('.map-thumb-placeholder');
      if (ph) {
        const realImg = document.createElement('img');
        realImg.className = 'map-thumb';
        realImg.src = map.img;
        realImg.alt = map.name;
        ph.replaceWith(realImg);
      }
    };
    img.src = map.img;

    card.onclick = () => openMap(map, mode);
    mapGrid.appendChild(card);
  });

  showScreen('screen-maps');
}

function goBack() { showScreen('screen-modes'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openMap(map, mode) {
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');

  lbImg.src = map.draft || map.img;
  lbImg.alt = map.name;

  lbImg.onerror = () => {
    lbImg.src = map.img;
    lbImg.style.display = 'block';
    document.getElementById('lb-title').textContent = map.name + ' (draft not found)';
  };

  lbImg.onload = () => {
    lbImg.style.display = 'block';
  };

  document.getElementById('lb-title').textContent = map.name;
  document.getElementById('lb-mode').textContent = mode.name;
  lb.style.setProperty('--lbmc', mode.color);
  lb.classList.add('open');
}

function closeLightbox(e) {
  if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lightbox-close')) {
    document.getElementById('lightbox').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox({ target: document.getElementById('lightbox') });
});
</script>
</body>
</html>
